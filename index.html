<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>

    幻界大戦

  </title>

  <link
    rel="stylesheet"
    href="./style.css"
  />

</head>

<body>

  <!-- =====================
       タイトル画面
  ====================== -->

  <section
    id="title-screen"
    class="screen active"
  >

    <h1 class="game-title">

      幻界大戦

    </h1>

    <button id="start-btn">

      GAME START

    </button>

  </section>

  <!-- =====================
       メニュー画面
  ====================== -->

  <section
    id="menu-screen"
    class="screen"
  >

    <h2>

      メインメニュー

    </h2>

    <div class="menu-buttons">

      <button id="menu-tame">

        モンスターテイム
        <br>
        (AIバトル)

      </button>

      <button id="menu-territory">

        領土争奪戦
        <br>
        (オンライン対戦)

      </button>

      <button id="menu-training">

        トレーニングバトル
        <br>
        (オンライン対戦)

      </button>

      <button id="menu-home">

        マイホーム
        <br>
        (パートナー選択 / コレクション)

      </button>

    </div>

  </section>

  <!-- =====================
       モンスターテイム
  ====================== -->

  <section
    id="tame-screen"
    class="screen"
  >

    <h2>

      モンスターテイム

    </h2>

    <p>

      AIバトル画面（仮）

    </p>

    <button class="back-btn">

      戻る

    </button>

  </section>

  <!-- =====================
       領土争奪戦
  ====================== -->

  <section
    id="territory-screen"
    class="screen"
  >

    <h2>

      領土争奪戦

    </h2>

    <p>

      オンライン対戦（未実装）

    </p>

    <button class="back-btn">

      戻る

    </button>

  </section>

  <!-- =====================
       トレーニング
  ====================== -->

  <section
    id="training-screen"
    class="screen"
  >

    <h2>

      トレーニングバトル

    </h2>

    <p>

      オンライン対戦（未実装）

    </p>

    <button class="back-btn">

      戻る

    </button>

  </section>

  <!-- =====================
       マイホーム
  ====================== -->

  <section
    id="home-screen"
    class="screen"
  >

    <h2>

      マイホーム

    </h2>

    <p>

      パートナー選択 / コレクション

    </p>

    <button class="back-btn">

      戻る

    </button>

  </section>

  <script
    type="module"
    src="./app.js"
  ></script>

</body>

</html>
